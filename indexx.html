<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassMetric — Secure Password Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">


        <!-- Right panel — forms -->
        <div class="auth-form-panel">
            <div class="auth-form-wrapper">

                <!-- Login Form -->
                <div id="login-form" class="auth-form active">
                    <h2>Welcome back</h2>
                    <p class="form-subtitle">Enter your master password to unlock your vault.</p>

                    <div id="login-error" class="form-error hidden"></div>

                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="login-password">Master password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="login-password" placeholder="Enter your master password" autocomplete="current-password">
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('login-password', this)">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <button class="btn btn-primary btn-full" id="login-btn" onclick="handleLogin()">
                        <span class="btn-text">Unlock vault</span>
                        <span class="btn-loader hidden"></span>
                    </button>

                    <p class="form-footer">
                        Don't have an account? <a href="#" onclick="switchForm('register')">Create one</a>
                    </p>
                </div>

                <!-- Register Form -->
                <div id="register-form" class="auth-form">
                    <h2>Create your vault</h2>
                    <p class="form-subtitle">Choose a strong master password. If you forget it, your data cannot be recovered.</p>

                    <div id="register-error" class="form-error hidden"></div>

                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" placeholder="you@example.com" autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="register-password">Master password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="register-password" placeholder="Choose a strong password" autocomplete="new-password" oninput="updateStrengthMeter(this.value)">
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('register-password', this)">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <!-- Strength meter -->
                        <div class="strength-meter">
                            <div class="strength-bar" id="strength-bar"></div>
                        </div>
                        <span class="strength-label" id="strength-label"></span>
                    </div>

                    <div class="form-group">
                        <label for="register-confirm">Confirm master password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="register-confirm" placeholder="Confirm your password" autocomplete="new-password">
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('register-confirm', this)">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <button class="btn btn-primary btn-full" id="register-btn" onclick="handleRegister()">
                        <span class="btn-text">Create account</span>
                        <span class="btn-loader hidden"></span>
                    </button>

                    <p class="form-footer">
                        Already have an account? <a href="#" onclick="switchForm('login')">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
